name: Package Chocolatey artifact

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Chocolatey pack
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          choco --version
          Push-Location chocolatey\missive
          choco pack .\missive.nuspec
          if ($LASTEXITCODE -ne 0) { throw "choco pack failed with $LASTEXITCODE" }
          Get-ChildItem *.nupkg
          Pop-Location

      - name: Upload nupkg
        uses: actions/upload-artifact@v4
        with:
          name: missive-chocolatey-nupkg
          path: chocolatey/missive/*.nupkg
