name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke-test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Full Chocolatey smoke test (pack, install, verify, uninstall)
        shell: pwsh
        run: ./scripts/Test-Package.ps1
